<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — МедАнамнез</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-logo">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="12" fill="#22c55e"/>
        <path d="M13 7h-2v4H7v2h4v4h2v-4h4v-2h-4V7z" fill="white"/>
      </svg>
      <h1>МедАнамнез</h1>
      <p>Система сбора анамнеза пациентов</p>
    </div>
    <div class="auth-card">
      <h2>Вход в систему</h2>
      {% if error %}
      <div class="alert alert-error">{{ error }}</div>
      {% endif %}
      <form method="post" action="/login">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="doctor@clinic.ru" required />
        </div>
        <div class="form-group">
          <label>Пароль</label>
          <input type="password" name="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Войти</button>
      </form>
      <div class="auth-links">
        <a href="/register">Регистрация пациента</a>
      </div>
    </div>
    <div class="auth-hint">
      <p>Тестовые аккаунты:</p>
      <p>Админ: <code>admin@clinic.ru</code> / <code>admin123</code></p>
      <p>Врач: <code>doctor@clinic.ru</code> / <code>doctor123</code></p>
      <p><small>Запустите <code>POST /admin/seed</code> для инициализации</small></p>
    </div>
  </div>
</body>
</html>
